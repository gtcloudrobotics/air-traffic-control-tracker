name: Autograding

on:
  push:
  workflow_dispatch:
  repository_dispatch:

permissions:
  contents: read
  checks: write
  actions: read

jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install "numpy>=1.24" "websockets>=12.0"

      - name: Autograde
        id: autograde
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: ATC tracker scenarios
          command: python run_tests.py --grade
          timeout: 120
          max-score: 7

      - uses: classroom-resources/autograding-grading-reporter@v1
        env:
          AUTOGRADE_RESULTS: ${{ steps.autograde.outputs.result }}
        with:
          runners: autograde
